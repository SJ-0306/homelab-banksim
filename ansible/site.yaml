---
- name: server entry
  hosts: debserver

  environment:
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Install python pip
      ansible.builtin.apt:
        name: python3-pip
        state: present
      become: true

    - name: Install python3-packaging
      ansible.builtin.apt:
        name: python3-packaging
        state: present
      become: true

    - name: Install kubernetes python package
      ansible.builtin.pip:
        name: kubernetes
        break_system_packages: true

    - name: k3s bin check
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_check

    - name: install k3s
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      when: not k3s_check.stat.exists

    - name: Create a k3s staff namespace
      kubernetes.core.k8s:
        name: staff
        api_version: v1
        kind: Namespace
        state: present

    - name: Create a k3s client namespace
      kubernetes.core.k8s:
        name: client
        api_version: v1
        kind: Namespace
        state: present
